<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <img src="logo.png" alt="Parium" class="loader-logo">
  <div class="loader-track"><div id="loader-bar"></div></div>
  <span id="loader-pct">0%</span>
</div>

<!-- MAIN STAGE -->
<main id="stage">

  <!-- GRAIN TEXTURE -->
  <svg class="grain" aria-hidden="true"><filter id="grain-filter"><feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#grain-filter)"/></svg>

  <!-- AMBIENT GLOW (parium gradient) -->
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- ROTATING HALOS -->
  <div class="halo halo-1" aria-hidden="true"></div>
  <div class="halo halo-2" aria-hidden="true"></div>

  <!-- SPINNING RINGS -->
  <div class="spin-ring spin-ring-a" aria-hidden="true"></div>
  <div class="spin-ring spin-ring-b" aria-hidden="true"></div>

  <!-- PHONE -->
  <div id="phone-wrap">
    <div class="phone-inner">
      <iframe src="https://my.spline.design/untitled-R9AE3iFR515l7EKvHCNavLb7/" frameborder="0" allowfullscreen></iframe>
    </div>
  </div>

  <!-- NOTIFICATION CARDS (bubblor) -->

  <!-- LEFT -->
  <div class="card c1" data-delay="0.7" data-dir="left">
    <div class="card-icon" style="--ico-hue:210">🎯</div>
    <div class="card-body">
      <p class="card-title">Ny matchning</p>
      <p class="card-sub">Spotify · UX Lead</p>
    </div>
    <span class="card-time">nu</span>
  </div>

  <div class="card c2" data-delay="1.05" data-dir="left">
    <div class="card-icon" style="--ico-hue:145">📅</div>
    <div class="card-body">
      <p class="card-title">Intervju bokad</p>
      <p class="card-sub">IKEA · imorgon kl 10</p>
    </div>
    <span class="card-time">5m</span>
  </div>

  <div class="card c3" data-delay="1.35" data-dir="left">
    <div class="card-icon" style="--ico-hue:270">⭐</div>
    <div class="card-body">
      <p class="card-title">Din profil</p>
      <p class="card-sub">Sedd av 28 arbetsgivare</p>
    </div>
    <span class="card-time">1h</span>
  </div>

  <!-- RIGHT -->
  <div class="card c4" data-delay="0.9" data-dir="right">
    <div class="card-icon" style="--ico-hue:25">💼</div>
    <div class="card-body">
      <p class="card-title">Nytt erbjudande</p>
      <p class="card-sub">65 000 kr / mån</p>
    </div>
    <span class="card-time">nu</span>
  </div>

  <div class="card c5" data-delay="1.2" data-dir="right">
    <div class="card-icon" style="--ico-hue:340">✦</div>
    <div class="card-body">
      <p class="card-title">Match 97 %</p>
      <p class="card-sub">Google · Stockholm</p>
    </div>
    <span class="card-time">12m</span>
  </div>

  <div class="card c6" data-delay="1.5" data-dir="right">
    <div class="card-icon" style="--ico-hue:45">🎉</div>
    <div class="card-body">
      <p class="card-title">Erbjudande signerat</p>
      <p class="card-sub">Välkommen till teamet!</p>
    </div>
    <span class="card-time">2h</span>
  </div>

  <!-- HEADER -->
  <header class="site-header" id="site-header">
    <img src="logo.png" alt="Parium" class="site-logo">
  </header>

  <!-- BOTTOM LABEL -->
  <p class="bottom-label" id="bottom-label">Rekrytering · På 60 sekunder</p>

</main>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
